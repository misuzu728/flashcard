<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IELTS 頻出語彙 暗記カード（日→英）</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: #e2e8f0;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 800px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 8px; font-size: 1.8rem; }
.subtitle { text-align:center; color:#94a3b8; margin-bottom:20px; font-size:14px; }
.controls {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin-bottom: 20px;
}
select, button {
  padding: 10px 16px; border-radius: 8px; border: none;
  background: #334155; color: #e2e8f0; cursor: pointer;
  font-size: 14px; transition: 0.2s;
}
button:hover { background: #475569; }
button.primary { background: #3b82f6; }
button.primary:hover { background: #2563eb; }
button.success { background: #10b981; }
button.success:hover { background: #059669; }
button.danger { background: #ef4444; }
button.danger:hover { background: #dc2626; }
button.toggle { background: #8b5cf6; }
button.toggle:hover { background: #7c3aed; }
.stats {
  display: flex; justify-content: space-around;
  background: #1e293b; padding: 12px; border-radius: 10px;
  margin-bottom: 15px; font-size: 14px;
}
.stat-item { text-align: center; }
.stat-num { font-size: 1.4rem; font-weight: bold; color: #60a5fa; }
.progress-bar {
  height: 8px; background: #334155; border-radius: 4px;
  overflow: hidden; margin-bottom: 20px;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
  transition: width 0.3s;
}

/* === カード関連CSS（修正版） === */
.card-wrapper { margin-bottom: 20px; }
.card {
  background: #1e293b;
  border-radius: 16px;
  min-height: 280px;
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: 2px solid #334155;
  position: relative;
  text-align: center;
}
.card-face { width: 100%; }
.card-back { display: none; }
.card.flipped .card-front { display: none; }
.card.flipped .card-back { display: flex; flex-direction: column; align-items: center; }
.card-theme {
  font-size: 13px; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 15px;
}
.card-content {
  font-size: 1.6rem; font-weight: 600;
  line-height: 1.4; margin-bottom: 15px;
}
.card-hint {
  margin-top: 15px;
  font-size: 12px;
  color: #64748b;
}
.card-type {
  display: inline-block; padding: 3px 10px;
  background: #3b82f6; color: white;
  border-radius: 20px; font-size: 11px;
  margin-bottom: 10px;
}
/* === ここまで === */

.nav-buttons {
  display: flex; justify-content: space-between; gap: 10px;
  margin-bottom: 15px;
}
.nav-buttons button { flex: 1; }
.action-buttons {
  display: flex; gap: 10px; justify-content: center;
}
.action-buttons button { padding: 12px 30px; font-weight: bold; }
.counter {
  text-align: center; color: #94a3b8;
  margin-bottom: 10px; font-size: 14px;
}
@media (max-width: 600px) {
  .card-content { font-size: 1.3rem; }
  .controls { flex-direction: column; }
  select, button { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <h1>🎴 IELTS 頻出語彙 暗記カード</h1>
  <div class="subtitle">日本語 → 英語 練習モード</div>

  <div class="controls">

  	<option value="society">👥 社会</option>
  	<option value="economy">💰 経済</option>

  	<option value="technology">💻 テクノロジー</option>
  	<option value="consumer">🛒 消費</option>
  	<option value="culture">🌐 文化</option>

  	<option value="crime">🚔 犯罪</option>

  	<option value="family">👨‍👩‍👧 家族</option>
    <option value="government">🏛️ 政府・政策</option>

	</select>
	<select id="modeFilter">
  	<option value="all">全レベル</option>
  	<option value="unlearned">未習得のみ</option>
  	<option value="learned">習得済みのみ</option>
	</select>
	<button onclick="toggleDirection()" class="toggle" id="dirBtn">🔄 日→英</button>
	<button onclick="shuffle()">🔀 シャッフル</button>
	<button onclick="resetProgress()" class="danger">🗑️ リセット</button>
  </div>

  <div class="stats">
	<div class="stat-item"><div class="stat-num" id="totalCount">0</div><div>総数</div></div>
	<div class="stat-item"><div class="stat-num" id="learnedCount">0</div><div>習得</div></div>
	<div class="stat-item"><div class="stat-num" id="progressPercent">0%</div><div>進捗</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="counter" id="counter">0 / 0</div>

  <div class="card-wrapper">
	<div class="card" id="card" onclick="flip()">
  	<div class="card-face card-front">
    	<div class="card-theme" id="cardTheme"></div>
    	<div class="card-type" id="cardType"></div>
    	<div class="card-content" id="cardFront"></div>
    	<div class="card-hint">クリックで英語を表示</div>
  	</div>
  	<div class="card-face card-back">
    	<div class="card-theme" id="cardThemeBack"></div>
    	<div class="card-content" id="cardBack"></div>
    	<div class="card-hint">クリックで戻す</div>
  	</div>
	</div>
  </div>

  <div class="nav-buttons">
	<button onclick="prev()">← 前 (←)</button>
	<button onclick="next()" class="primary">次 → (→)</button>
  </div>

  <div class="action-buttons">
	<button onclick="markLearned()" class="success">✅ 覚えた (1)</button>
	<button onclick="markUnlearned()" class="danger">🔄 まだ (2)</button>
  </div>

  <p style="text-align:center;margin-top:20px;color:#64748b;font-size:12px;">
	Space=反転 / ←→=移動 / 1=覚えた / 2=まだ / 🔄ボタンで方向切替
  </p>
</div>

const themeNames = {
  grammar:"🅰️ 文法構造",discussion:"🅱️ 議論・程度",
  environment:"🌍 環境",society:"👥 社会",economy:"💰 経済",
  transport:"🚗 交通・都市",education:"🎓 教育",technology:"💻 テクノロジー",
  consumer:"🛒 消費",culture:"🌐 文化",healthcare:"🏥 健康",
  crime:"🚔 犯罪",media:"📺 メディア",work:"💼 仕事",family:"👨‍👩‍👧 家族",government:"🏛️ 政府・政策"
};

let currentCards = [];
let idx = 0;
let learned = {};
let direction = 'jp_to_en';

function getKey(c) { return c.theme + ':' + c.front; }

function filterCards() {
  const theme = document.getElementById('themeFilter').value;
  const mode = document.getElementById('modeFilter').value;
  let result = cards.filter(c => theme === 'all' || c.theme === theme);
  if (mode === 'learned') result = result.filter(c => learned[getKey(c)]);
  if (mode === 'unlearned') result = result.filter(c => !learned[getKey(c)]);
  return result;
}

function render() {
  currentCards = filterCards();
  document.getElementById('dirBtn').textContent = direction === 'jp_to_en' ? '🔄 日→英' : '🔄 英→日';
  document.querySelector('.subtitle').textContent = direction === 'jp_to_en' ? '日本語 → 英語 練習モード' : '英語 → 日本語 練習モード';
  document.querySelector('.card-front .card-hint').textContent = direction === 'jp_to_en' ? 'クリックで英語を表示' : 'クリックで日本語を表示';

  if (currentCards.length === 0) {
    document.getElementById('cardFront').textContent = '該当カードなし';
    document.getElementById('cardBack').textContent = '';
    document.getElementById('cardTheme').textContent = '';
    document.getElementById('cardThemeBack').textContent = '';
    document.getElementById('cardType').textContent = '';
    document.getElementById('counter').textContent = '0 / 0';
	updateStats();
	return;
  }
  if (idx >= currentCards.length) idx = 0;
  if (idx < 0) idx = currentCards.length - 1;
  const c = currentCards[idx];
  const isLearned = learned[getKey(c)] ? ' ✅' : '';
  document.getElementById('cardTheme').textContent = themeNames[c.theme] + isLearned;
  document.getElementById('cardThemeBack').textContent = themeNames[c.theme] + isLearned;
  document.getElementById('cardType').textContent = c.type;
  if (direction === 'jp_to_en') {
    document.getElementById('cardFront').textContent = c.back;
    document.getElementById('cardBack').textContent = c.front;
  } else {
    document.getElementById('cardFront').textContent = c.front;
    document.getElementById('cardBack').textContent = c.back;
  }
  document.getElementById('counter').textContent = (idx + 1) + ' / ' + currentCards.length;
  document.getElementById('card').classList.remove('flipped');
  updateStats();
}

function updateStats() {
  const total = currentCards.length;
  const learnedNum = currentCards.filter(c => learned[getKey(c)]).length;
  const percent = total > 0 ? Math.round((learnedNum / total) * 100) : 0;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('learnedCount').textContent = learnedNum;
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressFill').style.width = percent + '%';
}

function flip() { document.getElementById('card').classList.toggle('flipped'); }
function next() { idx++; render(); }
function prev() { idx--; render(); }

function toggleDirection() {
  direction = direction === 'jp_to_en' ? 'en_to_jp' : 'jp_to_en';
  render();
}

function shuffle() {
  for (let i = currentCards.length - 1; i > 0; i--) {
	const j = Math.floor(Math.random() * (i + 1));
	[currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  idx = 0;
  render();
}

function markLearned() {
  if (currentCards.length === 0) return;
  learned[getKey(currentCards[idx])] = true;
  next();
}

function markUnlearned() {
  if (currentCards.length === 0) return;
  delete learned[getKey(currentCards[idx])];
  next();
}

function resetProgress() {
  if (confirm('進捗を全てリセットしますか？')) {
	learned = {};
	render();
  }
}

document.getElementById('themeFilter').addEventListener('change', () => { idx = 0; render(); });
document.getElementById('modeFilter').addEventListener('change', () => { idx = 0; render(); });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  if (e.code === 'ArrowRight') next();
  if (e.code === 'ArrowLeft') prev();
  if (e.code === 'Digit1') markLearned();
  if (e.code === 'Digit2') markUnlearned();
});

render();
</script>
